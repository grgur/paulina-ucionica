<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paulinina Učionica</title>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-main: #FFF8F0;
      --bg-card: #FFFFFF;
      --text-main: #3A3A3A;
      --text-light: #6B6B6B;
      --blue: #4A90D9;
      --blue-light: #E8F4FD;
      --green: #5CB85C;
      --green-light: #E8F8E8;
      --orange: #FF9800;
      --orange-light: #FFF3E0;
      --purple: #9B59B6;
      --purple-light: #F3E8FD;
      --teal: #26A69A;
      --teal-light: #E0F2F1;
      --radius: 16px;
      --shadow: 0 2px 12px rgba(0,0,0,0.06);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Lexend', 'Verdana', sans-serif;
      background: var(--bg-main);
      color: var(--text-main);
      line-height: 1.8;
      letter-spacing: 0.03em;
      min-height: 100vh;
    }

    .hero {
      background: linear-gradient(135deg, #4A90D9 0%, #26A69A 50%, #9B59B6 100%);
      color: white;
      padding: 48px 24px 56px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(255,255,255,0.08) 0%, transparent 60%);
      animation: shimmer 8s ease-in-out infinite;
    }

    @keyframes shimmer {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(5%, 3%); }
    }

    .hero h1 {
      font-size: 38px;
      font-weight: 700;
      margin-bottom: 8px;
      position: relative;
      z-index: 1;
    }

    .hero p {
      font-size: 20px;
      opacity: 0.9;
      font-weight: 300;
      position: relative;
      z-index: 1;
    }

    .hero .emoji-row {
      font-size: 32px;
      margin-top: 16px;
      position: relative;
      z-index: 1;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 32px 20px 64px;
    }

    .stats {
      display: flex;
      gap: 16px;
      margin-bottom: 36px;
      flex-wrap: wrap;
    }

    .stat-card {
      flex: 1;
      min-width: 140px;
      background: var(--bg-card);
      border-radius: var(--radius);
      padding: 20px;
      text-align: center;
      box-shadow: var(--shadow);
    }

    .stat-card .number {
      font-size: 36px;
      font-weight: 700;
      line-height: 1.2;
    }

    .stat-card .label {
      font-size: 14px;
      color: var(--text-light);
      margin-top: 4px;
    }

    .stat-card.lekcije .number { color: var(--blue); }
    .stat-card.ispiti .number { color: var(--green); }
    .stat-card.zadaci .number { color: var(--orange); }

    .section-title {
      font-size: 26px;
      font-weight: 600;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .section-title .icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
    }

    .section-title .icon.lekcije { background: var(--blue-light); }
    .section-title .icon.ispiti { background: var(--green-light); }
    .section-title .icon.zadaci { background: var(--orange-light); }

    .section { margin-bottom: 40px; }

    .card-list { display: flex; flex-direction: column; gap: 12px; }

    .card-link {
      display: flex;
      align-items: center;
      gap: 16px;
      background: var(--bg-card);
      border-radius: var(--radius);
      padding: 20px 24px;
      text-decoration: none;
      color: var(--text-main);
      box-shadow: var(--shadow);
      transition: all 0.2s ease;
      border-left: 5px solid transparent;
    }

    .card-link:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }

    .card-link.lekcija { border-left-color: var(--blue); }
    .card-link.ispit { border-left-color: var(--green); }
    .card-link.zadatak { border-left-color: var(--orange); }

    .card-link .card-icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      flex-shrink: 0;
    }

    .card-link.lekcija .card-icon { background: var(--blue-light); }
    .card-link.ispit .card-icon { background: var(--green-light); }
    .card-link.zadatak .card-icon { background: var(--orange-light); }

    .card-link .card-info { flex: 1; }

    .card-link .card-title {
      font-size: 19px;
      font-weight: 600;
      margin-bottom: 2px;
    }

    .card-link .card-date {
      font-size: 14px;
      color: var(--text-light);
    }

    .card-link .card-arrow {
      font-size: 20px;
      color: #CCC;
      transition: color 0.2s;
    }

    .card-link:hover .card-arrow { color: var(--blue); }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-light);
      font-size: 18px;
    }

    .empty-state .emoji { font-size: 48px; margin-bottom: 12px; }

    .new-badge {
      display: inline-block;
      background: #FF6B6B;
      color: white;
      font-size: 11px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 6px;
      margin-left: 8px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      vertical-align: middle;
    }

    footer {
      text-align: center;
      padding: 24px;
      color: var(--text-light);
      font-size: 14px;
    }

    @media (max-width: 600px) {
      .hero h1 { font-size: 28px; }
      .hero p { font-size: 17px; }
      .stats { flex-direction: column; }
      .card-link { padding: 16px 18px; }
      .card-link .card-title { font-size: 17px; }
    }
  </style>
</head>
<body>
  <div class="hero">
    <h1>Paulinina Učionica</h1>
    <p>Interaktivne lekcije, ispiti i zadaci</p>
    <div class="emoji-row">📚 ✨ 🎯</div>
  </div>

  <div class="container">
    <div class="stats">
      <div class="stat-card lekcije">
        <div class="number" id="count-lekcije">0</div>
        <div class="label">Lekcija</div>
      </div>
      <div class="stat-card ispiti">
        <div class="number" id="count-ispiti">0</div>
        <div class="label">Ispita</div>
      </div>
      <div class="stat-card zadaci">
        <div class="number" id="count-zadaci">0</div>
        <div class="label">Zadataka</div>
      </div>
    </div>

    <!-- Najnovije -->
    <div class="section" id="section-najnovije">
      <h2 class="section-title">
        <span class="icon" style="background: var(--purple-light);">🆕</span>
        Najnovije
      </h2>
      <div class="card-list" id="list-najnovije"></div>
    </div>

    <!-- Lekcije -->
    <div class="section" id="section-lekcije">
      <h2 class="section-title">
        <span class="icon lekcije">📖</span>
        Lekcije
      </h2>
      <div class="card-list" id="list-lekcije"></div>
    </div>

    <!-- Ispiti -->
    <div class="section" id="section-ispiti">
      <h2 class="section-title">
        <span class="icon ispiti">📝</span>
        Ispiti i kvizovi
      </h2>
      <div class="card-list" id="list-ispiti"></div>
    </div>

    <!-- Zadaci -->
    <div class="section" id="section-zadaci">
      <h2 class="section-title">
        <span class="icon zadaci">🔢</span>
        Matematički zadaci
      </h2>
      <div class="card-list" id="list-zadaci"></div>
    </div>
  </div>

  <footer>
    Napravljeno s ❤️ za Paulinu
  </footer>

  <script>
    /*
     * content-index.json is auto-generated by the deploy script.
     * Structure:
     * {
     *   "lekcije": [ { "title": "...", "file": "lekcije/xyz.html", "date": "2026-03-04", "subject": "..." } ],
     *   "ispiti":  [ ... ],
     *   "zadaci":  [ ... ]
     * }
     */

    const TYPE_CONFIG = {
      lekcije: { icon: '📖', css: 'lekcija', label: 'Lekcija' },
      ispiti:  { icon: '📝', css: 'ispit',   label: 'Ispit' },
      zadaci:  { icon: '🔢', css: 'zadatak', label: 'Zadatak' }
    };

    function isNew(dateStr) {
      const d = new Date(dateStr);
      const now = new Date();
      return (now - d) < 3 * 24 * 60 * 60 * 1000; // 3 days
    }

    function formatDate(dateStr) {
      const months = ['sij','velj','ožu','tra','svi','lip','srp','kol','ruj','lis','stu','pro'];
      const d = new Date(dateStr);
      return `${d.getDate()}. ${months[d.getMonth()]} ${d.getFullYear()}.`;
    }

    function renderCard(item, type) {
      const cfg = TYPE_CONFIG[type];
      const newBadge = isNew(item.date) ? '<span class="new-badge">novo</span>' : '';
      const subject = item.subject ? ` · ${item.subject}` : '';
      return `
        <a href="${item.file}" class="card-link ${cfg.css}">
          <div class="card-icon">${cfg.icon}</div>
          <div class="card-info">
            <div class="card-title">${item.title}${newBadge}</div>
            <div class="card-date">${formatDate(item.date)}${subject}</div>
          </div>
          <div class="card-arrow">→</div>
        </a>
      `;
    }

    function renderEmpty(type) {
      const msgs = {
        lekcije: { emoji: '📖', text: 'Još nema lekcija. Uskoro dolaze!' },
        ispiti:  { emoji: '📝', text: 'Još nema ispita. Prvo lekcija, pa ispit!' },
        zadaci:  { emoji: '🔢', text: 'Još nema zadataka. Spremamo ih!' }
      };
      const m = msgs[type];
      return `<div class="empty-state"><div class="emoji">${m.emoji}</div>${m.text}</div>`;
    }

    async function init() {
      try {
        const resp = await fetch('content-index.json');
        if (!resp.ok) throw new Error('No index');
        const data = await resp.json();

        // Update counts
        document.getElementById('count-lekcije').textContent = (data.lekcije || []).length;
        document.getElementById('count-ispiti').textContent = (data.ispiti || []).length;
        document.getElementById('count-zadaci').textContent = (data.zadaci || []).length;

        // Render each section
        for (const type of ['lekcije', 'ispiti', 'zadaci']) {
          const list = document.getElementById('list-' + type);
          const items = (data[type] || []).sort((a, b) => new Date(b.date) - new Date(a.date));
          if (items.length === 0) {
            list.innerHTML = renderEmpty(type);
          } else {
            list.innerHTML = items.map(item => renderCard(item, type)).join('');
          }
        }

        // "Najnovije" section — last 5 items across all types, sorted by date
        const all = [];
        for (const type of ['lekcije', 'ispiti', 'zadaci']) {
          for (const item of (data[type] || [])) {
            all.push({ ...item, _type: type });
          }
        }
        all.sort((a, b) => new Date(b.date) - new Date(a.date));
        const latest = all.slice(0, 5);

        const listNajnovije = document.getElementById('list-najnovije');
        if (latest.length === 0) {
          document.getElementById('section-najnovije').style.display = 'none';
        } else {
          listNajnovije.innerHTML = latest.map(item => renderCard(item, item._type)).join('');
        }

      } catch (e) {
        // No index yet — show empty states
        for (const type of ['lekcije', 'ispiti', 'zadaci']) {
          document.getElementById('list-' + type).innerHTML = renderEmpty(type);
        }
        document.getElementById('section-najnovije').style.display = 'none';
      }
    }

    init();
  </script>
</body>
</html>
